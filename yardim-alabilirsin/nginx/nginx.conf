events {}

http {
  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 80;

    location = /oauth2/auth {
      internal;
      proxy_pass http://oauth2_proxy:4180/oauth2/auth;
      proxy_set_header Host $host;
      proxy_set_header X-Original-URI $request_uri;
      proxy_set_header X-Scheme $scheme;
      proxy_set_header X-Auth-Request-Redirect $request_uri;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
    }

    location @oauth2_signin {
      return 302 /oauth2/sign_in?rd=$request_uri;
    }

    location /portal/ {
      auth_request /oauth2/auth;
      error_page 401 = @oauth2_signin;
      proxy_pass http://portal/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /grafana/ {
      proxy_pass http://grafana:3000/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /grafana;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location /oauth2/ {
      proxy_pass http://oauth2_proxy:4180/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /prometheus/ {
      auth_request /oauth2/auth;
      error_page 401 = @oauth2_signin;
      proxy_pass http://prometheus:9090/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /prometheus;
    }

    location /mlflow/ {
      auth_request /oauth2/auth;
      error_page 401 = @oauth2_signin;
      proxy_pass http://mlflow:5000/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /mlflow;
    }

    location /static/ {
      auth_request /oauth2/auth;
      error_page 401 = @oauth2_signin;
      proxy_pass http://mlflow:5000;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ajax-api/ {
      auth_request /oauth2/auth;
      error_page 401 = @oauth2_signin;
      proxy_pass http://mlflow:5000;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      auth_request /oauth2/auth;
      error_page 401 = @oauth2_signin;
      proxy_pass http://mlflow:5000;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /gpu-serving/ {
      auth_request /oauth2/auth;
      error_page 401 = @oauth2_signin;
      proxy_pass http://gpu_serving_sim:9700/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /gpu-orchestrator/ {
      auth_request /oauth2/auth;
      error_page 401 = @oauth2_signin;
      proxy_pass http://gpu_orchestrator:9702/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /keycloak/ {
      proxy_pass http://keycloak:8080/keycloak/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = / {
      return 302 /portal/;
    }
  }
}

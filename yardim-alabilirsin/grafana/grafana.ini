[server]
root_url = http://localhost/grafana/
serve_from_sub_path = true

[auth]
disable_login_form = true

[auth.generic_oauth]
enabled = true
name = Keycloak
allow_sign_up = true
auto_login = true
client_id = grafana
client_secret = CHANGE_ME_GRAFANA_SECRET
scopes = openid profile email
auth_url  = http://localhost/keycloak/realms/ai/protocol/openid-connect/auth
token_url = http://localhost/keycloak/realms/ai/protocol/openid-connect/token
api_url   = http://localhost/keycloak/realms/ai/protocol/openid-connect/userinfo
use_pkce = true

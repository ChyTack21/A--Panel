events {}

http {
  resolver 127.0.0.11 valid=30s ipv6=off;
  proxy_buffer_size 32k;
  proxy_buffers 8 32k;
  proxy_busy_buffers_size 64k;
  large_client_header_buffers 8 32k;

  server {
    listen 80;

    location /oauth2/portal/ {
      proxy_pass http://oauth2_proxy_portal:4180;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /oauth2/mlflow/ {
      proxy_pass http://oauth2_proxy_mlflow:4180;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /oauth2/grafana/ {
      proxy_pass http://oauth2_proxy_grafana:4180;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /oauth2/prometheus/ {
      proxy_pass http://oauth2_proxy_prometheus:4180;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /portal/ {
      proxy_pass http://oauth2_proxy_portal:4180/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /portal;
      proxy_set_header X-Forwarded-Uri $request_uri;
      proxy_set_header X-Auth-Request-Redirect $request_uri;
    }

    location /mlflow/ {
      proxy_pass http://oauth2_proxy_mlflow:4180/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /mlflow;
      proxy_set_header X-Forwarded-Uri $request_uri;
      proxy_set_header X-Auth-Request-Redirect $request_uri;
    }

    location /grafana/ {
      proxy_pass http://oauth2_proxy_grafana:4180;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /grafana;
      proxy_set_header X-Forwarded-Uri $request_uri;
      proxy_set_header X-Auth-Request-Redirect $request_uri;
    }

    location /prometheus/ {
      proxy_pass http://oauth2_proxy_prometheus:4180/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /prometheus;
      proxy_set_header X-Forwarded-Uri $request_uri;
      proxy_set_header X-Auth-Request-Redirect $request_uri;
    }

    location /gpu-loadgen/ {
      proxy_pass http://gpu_loadgen:9703/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /gpu-loadgen;
      proxy_set_header X-Forwarded-Uri $request_uri;
      proxy_set_header X-Auth-Request-Redirect $request_uri;
    }

    location /gpu-serving/ {
      proxy_pass http://gpu_serving_sim:9700/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /gpu-serving;
      proxy_set_header X-Forwarded-Uri $request_uri;
      proxy_set_header X-Auth-Request-Redirect $request_uri;
    }

    location /gpu-learning/ {
      proxy_pass http://gpu_learning_sim:9701/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /gpu-learning;
      proxy_set_header X-Forwarded-Uri $request_uri;
      proxy_set_header X-Auth-Request-Redirect $request_uri;
    }

    location /gpu-orchestrator/ {
      proxy_pass http://gpu_orchestrator:9702/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /gpu-orchestrator;
      proxy_set_header X-Forwarded-Uri $request_uri;
      proxy_set_header X-Auth-Request-Redirect $request_uri;
    }

    location /static/ {
      proxy_pass http://oauth2_proxy_mlflow:4180;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ajax-api/ {
      proxy_pass http://oauth2_proxy_mlflow:4180;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      proxy_pass http://oauth2_proxy_mlflow:4180;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /keycloak/ {
      set $keycloak_upstream http://keycloak:8080;
      proxy_pass $keycloak_upstream$request_uri;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /keycloak;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = / {
      return 302 /portal/;
    }
  }
}

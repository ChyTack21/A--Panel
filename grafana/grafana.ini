[server]
root_url = http://localhost/grafana/
serve_from_sub_path = true

[auth]
disable_login_form = true
disable_signout_menu = false

[users]
default_language = detect

[security]
allow_embedding = true

[auth.proxy]
enabled = true
header_name = X-Forwarded-User
header_property = username
auto_sign_up = true
sync_ttl = 15

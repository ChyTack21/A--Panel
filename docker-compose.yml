version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: ai_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpass
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [ainet]

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: ai_keycloak
    restart: unless-stopped
    depends_on: [keycloak_db]
    command: ["start-dev", "--http-port=8080", "--import-realm"]
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak_db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloakpass
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_PROXY: edge
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_RELATIVE_PATH: /keycloak
    networks: [ainet]

  keycloak_db:
    image: postgres:16
    container_name: ai_keycloak_db
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloakpass
      POSTGRES_DB: keycloak
    volumes:
      - keycloak_pgdata:/var/lib/postgresql/data
    networks: [ainet]

  mlflow_db:
    image: postgres:16
    container_name: ai_mlflow_db
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflowpass
      POSTGRES_DB: mlflow
    volumes:
      - mlflow_pgdata:/var/lib/postgresql/data
    networks: [ainet]

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: ai_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    volumes:
      - minio_data:/data
    networks: [ainet]

  minio_init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    container_name: ai_minio_init
    depends_on: [minio]
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "mc alias set local http://minio:9000 minio minio12345 &&
       mc mb -p local/mlflow || true &&
       mc anonymous set download local/mlflow || true &&
       echo 'MinIO bucket ready.'"
    networks: [ainet]

  mlflow:
    build: ./mlflow
    container_name: ai_mlflow
    depends_on: [mlflow_db, minio_init]
    command: >
      mlflow server
      --host 0.0.0.0 --port 5000
      --backend-store-uri postgresql+psycopg2://mlflow:mlflowpass@mlflow_db:5432/mlflow
      --default-artifact-root s3://mlflow/
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio12345
      AWS_REGION: us-east-1
    networks: [ainet]

  oauth2_proxy_portal:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    container_name: ai_oauth2_proxy_portal
    restart: unless-stopped
    depends_on:
      keycloak:
        condition: service_started
      portal:
        condition: service_started
    environment: &oauth2_common
      OAUTH2_PROXY_PROVIDER: oidc
      OAUTH2_PROXY_SKIP_OIDC_DISCOVERY: "true"
      OAUTH2_PROXY_OIDC_ISSUER_URL: http://localhost/keycloak/realms/ai
      OAUTH2_PROXY_LOGIN_URL: http://localhost/keycloak/realms/ai/protocol/openid-connect/auth
      OAUTH2_PROXY_REDEEM_URL: http://keycloak:8080/keycloak/realms/ai/protocol/openid-connect/token
      OAUTH2_PROXY_PROFILE_URL: http://keycloak:8080/keycloak/realms/ai/protocol/openid-connect/userinfo
      OAUTH2_PROXY_OIDC_JWKS_URL: http://keycloak:8080/keycloak/realms/ai/protocol/openid-connect/certs
      OAUTH2_PROXY_SKIP_CLAIMS_FROM_PROFILE_URL: "true"
      OAUTH2_PROXY_COOKIE_SECURE: "false"
      OAUTH2_PROXY_COOKIE_SAMESITE: lax
      OAUTH2_PROXY_SESSION_COOKIE_MINIMAL: "true"
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_SET_AUTHORIZATION_HEADER: "false"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "false"
      OAUTH2_PROXY_PASS_USER_HEADERS: "true"
      OAUTH2_PROXY_CODE_CHALLENGE_METHOD: S256
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_OIDC_EMAIL_CLAIM: email
      OAUTH2_PROXY_CLIENT_ID: portal
      OAUTH2_PROXY_CLIENT_SECRET: "CHANGE_ME_PORTAL_SECRET"
      OAUTH2_PROXY_REDIRECT_URL: http://localhost/oauth2/portal/callback
      OAUTH2_PROXY_PROXY_PREFIX: /oauth2/portal
      OAUTH2_PROXY_COOKIE_NAME: _oauth2_proxy_portal
      OAUTH2_PROXY_COOKIE_SECRET: "pEYv6zDJiL0g4IgjmCjA6GAcIe1AcpYyxyTAMgL4i-Q="
      OAUTH2_PROXY_UPSTREAMS: http://portal/
    networks: [ainet]

  oauth2_proxy_mlflow:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    container_name: ai_oauth2_proxy_mlflow
    restart: unless-stopped
    depends_on:
      keycloak:
        condition: service_started
      mlflow:
        condition: service_started
    environment:
      <<: *oauth2_common
      OAUTH2_PROXY_CLIENT_ID: mlflow
      OAUTH2_PROXY_CLIENT_SECRET: "CHANGE_ME_MLFLOW_SECRET"
      OAUTH2_PROXY_REDIRECT_URL: http://localhost/oauth2/mlflow/callback
      OAUTH2_PROXY_PROXY_PREFIX: /oauth2/mlflow
      OAUTH2_PROXY_COOKIE_NAME: _oauth2_proxy_mlflow
      OAUTH2_PROXY_COOKIE_SECRET: "U2crX2h10rAfghYv8CxOPYT59HzSTGnekoKqKN9eZnE="
      OAUTH2_PROXY_UPSTREAMS: http://mlflow:5000/
    networks: [ainet]

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: ai_prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.external-url=http://localhost/prometheus/
      - --web.route-prefix=/
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks: [ainet]

  gpu_metrics_exporter:
    build: ./gpu-exporter
    container_name: ai_gpu_metrics_exporter
    restart: unless-stopped
    gpus: all
    environment:
      EXPORTER_PORT: "9500"
      SCRAPE_INTERVAL_SECONDS: "5"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: utility,compute
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9500/metrics', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks: [ainet]

  gpu_serving_sim:
    build: ./gpu-serving-sim
    container_name: ai_gpu_serving_sim
    restart: unless-stopped
    gpus: all
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: utility,compute
      SERVING_PORT: "9700"
      SERVING_DEFAULT_MATRIX_SIZE: "3072"
      SERVING_DEFAULT_STEPS: "3"
      SERVING_DEFAULT_BATCHES: "2"
      SERVING_DEFAULT_PRECISION: "float16"
      SERVING_CONCURRENCY: "2"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9700/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks: [ainet]

  gpu_learning_sim:
    build: ./gpu-learning-sim
    container_name: ai_gpu_learning_sim
    restart: unless-stopped
    gpus: all
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: utility,compute
      LEARNING_PORT: "9701"
      LEARNING_MODE: "balanced"
      LEARNING_PRECISION: "float16"
      LEARNING_AGGRESSIVE_MATRIX_SIZE: "5632"
      LEARNING_AGGRESSIVE_BATCHES: "4"
      LEARNING_AGGRESSIVE_SLEEP: "0.10"
      LEARNING_BALANCED_MATRIX_SIZE: "4096"
      LEARNING_BALANCED_BATCHES: "3"
      LEARNING_BALANCED_SLEEP: "0.60"
      LEARNING_TRICKLE_MATRIX_SIZE: "3072"
      LEARNING_TRICKLE_BATCHES: "1"
      LEARNING_TRICKLE_SLEEP: "1.20"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9701/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks: [ainet]

  gpu_orchestrator:
    build: ./gpu-orchestrator
    container_name: ai_gpu_orchestrator
    restart: unless-stopped
    depends_on:
      gpu_serving_sim:
        condition: service_started
      gpu_learning_sim:
        condition: service_started
      gpu_metrics_exporter:
        condition: service_started
    environment:
      ORCH_PORT: "9702"
      ORCH_POLL_INTERVAL_SECONDS: "3"
      SERVING_STATUS_URL: "http://gpu_serving_sim:9700/status"
      LEARNING_CONTROL_URL: "http://gpu_learning_sim:9701/control"
      LEARNING_STATUS_URL: "http://gpu_learning_sim:9701/status"
      FALLBACK_METRICS_URL: "http://gpu_metrics_exporter:9500/metrics"
      ORCH_SERVING_ACTIVE_PAUSE_THRESHOLD: "2"
      ORCH_SERVING_QUEUE_PAUSE_THRESHOLD: "1"
      ORCH_SERVING_LATENCY_WARN_SECONDS: "1.0"
      ORCH_GPU_AGGRESSIVE_MAX_UTIL: "40"
      ORCH_GPU_BALANCED_MAX_UTIL: "70"
      ORCH_GPU_MEMORY_MAX_PERCENT: "82"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9702/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks: [ainet]

  gpu_loadgen:
    build: ./gpu-loadgen
    container_name: ai_gpu_loadgen
    restart: unless-stopped
    depends_on:
      gpu_serving_sim:
        condition: service_started
    environment:
      LOADGEN_PORT: "9703"
      LOADGEN_TARGET_URL: "http://gpu_serving_sim:9700/infer"
      LOADGEN_DEFAULT_MATRIX_SIZE: "2048"
      LOADGEN_DEFAULT_STEPS: "2"
      LOADGEN_DEFAULT_BATCHES: "1"
      LOADGEN_DEFAULT_PRECISION: "float16"
      LOADGEN_DEFAULT_WORKERS: "0"
      LOADGEN_DEFAULT_INTERVAL_SECONDS: "0.5"
      LOADGEN_REQUEST_TIMEOUT_SECONDS: "120"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9703/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks: [ainet]

  oauth2_proxy_prometheus:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    container_name: ai_oauth2_proxy_prometheus
    restart: unless-stopped
    depends_on:
      keycloak:
        condition: service_started
      prometheus:
        condition: service_started
    environment:
      <<: *oauth2_common
      OAUTH2_PROXY_CLIENT_ID: prometheus
      OAUTH2_PROXY_CLIENT_SECRET: "CHANGE_ME_PROMETHEUS_SECRET"
      OAUTH2_PROXY_REDIRECT_URL: http://localhost/oauth2/prometheus/callback
      OAUTH2_PROXY_PROXY_PREFIX: /oauth2/prometheus
      OAUTH2_PROXY_COOKIE_NAME: _oauth2_proxy_prometheus
      OAUTH2_PROXY_COOKIE_SECRET: "dBU7tRpRyyhJh3qU6BQ8vNQeQEkD2MFE9RhhVgjjqOg="
      OAUTH2_PROXY_UPSTREAMS: http://prometheus:9090/
    networks: [ainet]

  loki:
    image: grafana/loki:3.1.1
    container_name: ai_loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
    networks: [ainet]

  promtail:
    image: grafana/promtail:3.1.1
    container_name: ai_promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks: [ainet]

  grafana:
    image: grafana/grafana:11.1.4
    container_name: ai_grafana
    depends_on: [prometheus, loki]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks: [ainet]

  oauth2_proxy_grafana:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    container_name: ai_oauth2_proxy_grafana
    restart: unless-stopped
    depends_on:
      keycloak:
        condition: service_started
      grafana:
        condition: service_started
    environment:
      <<: *oauth2_common
      OAUTH2_PROXY_CLIENT_ID: grafana
      OAUTH2_PROXY_CLIENT_SECRET: "CHANGE_ME_GRAFANA_SECRET"
      OAUTH2_PROXY_REDIRECT_URL: http://localhost/oauth2/grafana/callback
      OAUTH2_PROXY_PROXY_PREFIX: /oauth2/grafana
      OAUTH2_PROXY_COOKIE_NAME: _oauth2_proxy_grafana
      OAUTH2_PROXY_COOKIE_SECRET: "AcpsrJx0WHiN5zVOJirKw-EO0F7bFfBG8P4EePgL4Wo="
      OAUTH2_PROXY_UPSTREAMS: http://grafana:3000
    networks: [ainet]

  portal:
    image: nginx:alpine
    container_name: ai_portal
    volumes:
      - ./portal/index.html:/usr/share/nginx/html/index.html:ro
      - ./portal/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [ainet]

  nginx:
    image: nginx:alpine
    container_name: ai_nginx
    restart: unless-stopped
    depends_on:
      portal:
        condition: service_started
      keycloak:
        condition: service_started
      oauth2_proxy_portal:
        condition: service_started
      oauth2_proxy_mlflow:
        condition: service_started
      oauth2_proxy_grafana:
        condition: service_started
      oauth2_proxy_prometheus:
        condition: service_started
      gpu_loadgen:
        condition: service_started
      gpu_orchestrator:
        condition: service_started
      gpu_serving_sim:
        condition: service_started
      gpu_learning_sim:
        condition: service_started
      grafana:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks: [ainet]

networks:
  ainet:

volumes:
  pgdata:
  mlflow_pgdata:
  minio_data:
  grafana_data:
  keycloak_pgdata:
